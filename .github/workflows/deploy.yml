# Github에 표시되는 이름
name: DineQ Frontend

# 자동화 조건, main branch push
on:
  push:
    branches:
      - develop

# 권한
permissions:
# 레포 코드 읽기
  contents: read
# GHCR Push 권한
  packages: write

# 전체 workflow에서 사용할 env 변수
env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/dineq-test-frontend

jobs:
  build-and-deploy:
# Github가 제공하는 가상머신 설정
    runs-on: ubuntu-latest
# jobs 안에서 실행할 순서
    steps:
      - name: Checkout
        uses: actions/checkout@v4
# buildx가 캐시 지원
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: | 
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_WSS=${{ secrets.NEXT_PUBLIC_WS_WSS }}
            NEXT_STANDALONE=${{ secrets.NEXT_STANDALONE }}

      - name: Deploy to mini PC
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            cd /home/sunyeop/dineq
            docker compose pull
            docker compose up -d
            docker image prune -f
